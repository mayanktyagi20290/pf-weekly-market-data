name: Nifty 500 Weekly Screener

on:
  schedule:
    # Friday 15:45 IST = 10:15 UTC, i.e. ~15 min after market close.
    - cron: "15 10 * * 5"
  workflow_dispatch: {}   # manual trigger from the Actions tab

permissions:
  contents: write

jobs:
  screen-nifty500:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install yfinance pandas numpy pytz requests

      - name: Run Nifty 500 screener
        run: python nifty500_screener.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add nifty500_screener.json
          git diff --staged --quiet || git commit -m "Nifty 500 weekly screener $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
